<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunset Menü</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0d0d0d;
    --yellow:#f7c600;
    --red:#e0201c;
    --cream:#fff7dc;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--black);
    font-family:'Poppins',sans-serif;
    color:var(--cream);
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  /* HERO */
  .hero{
    background:var(--yellow);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:38px 20px 30px;
    position:relative;
    border-bottom:6px solid var(--black);
  }
  .hero .brand{
    font-family:'Great Vibes',cursive;
    color:var(--red);
    font-size:3.2rem;
    text-shadow:0 0 14px rgba(224,32,28,.55), 0 0 2px rgba(224,32,28,.8);
    line-height:1;
  }
  .sun{
    width:90px;height:auto;margin-bottom:6px;
  }
  .hero .menu-word{
    font-family:'Great Vibes',cursive;
    color:var(--red);
    font-size:3.6rem;
    text-shadow:0 0 14px rgba(224,32,28,.55), 0 0 2px rgba(224,32,28,.8);
    margin-top:-4px;
  }
  /* ACCORDION LIST */
  .accordion{
    padding:18px 14px 8px;
    max-width:560px;
    margin:0 auto;
  }
  .category{
    background:#141414;
    border:1px solid #262626;
    border-radius:14px;
    margin-bottom:12px;
    overflow:hidden;
  }
  .category .cat-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:16px 18px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }
  .category h2{
    font-family:'Great Vibes',cursive;
    color:var(--yellow);
    font-size:1.9rem;
    line-height:1;
  }
  .cat-header .chevron{
    flex:0 0 auto;
    width:22px;height:22px;
    color:var(--red);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
  }
  .category.open .chevron{
    transform:rotate(180deg);
  }
  .cat-body{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .38s cubic-bezier(.4,0,.2,1);
  }
  .category.open .cat-body{
    grid-template-rows:1fr;
  }
  .cat-body-inner{
    overflow:hidden;
  }
  .cat-items{
    padding:0 18px 16px;
    border-top:1px solid rgba(247,198,0,.2);
  }
  .item{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:11px 0;
    border-bottom:1px dotted rgba(247,198,0,.25);
    gap:10px;
  }
  .item:last-child{ border-bottom:none; }
  .item .name{
    font-size:.95rem;
    font-weight:500;
  }
  .item .note{
    display:block;
    font-size:.72rem;
    color:#b8b8b8;
    font-weight:400;
  }
  .item .price{
    font-weight:700;
    color:var(--yellow);
    white-space:nowrap;
    font-size:.95rem;
  }
  @media (max-width:400px){
    .hero .menu-word{ font-size:2.9rem; }
    .hero .brand{ font-size:2.1rem; }
    .category h2{ font-size:1.6rem; }
  }
  .empty-msg{
    text-align:center;
    color:#888;
    padding:60px 20px;
    font-size:.9rem;
  }
  footer{
    text-align:center;
    padding:26px 10px 10px;
    color:#666;
    font-size:.72rem;
  }
</style>
</head>
<body>

<div class="hero">
  <svg class="sun" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
    <g stroke="var(--red)" stroke-width="4" stroke-linecap="round">
      <line x1="100" y1="5" x2="100" y2="25"/>
      <line x1="60" y1="10" x2="68" y2="28"/>
      <line x1="140" y1="10" x2="132" y2="28"/>
      <line x1="30" y1="28" x2="42" y2="40"/>
      <line x1="170" y1="28" x2="158" y2="40"/>
      <line x1="15" y1="55" x2="30" y2="55"/>
      <line x1="185" y1="55" x2="170" y2="55"/>
      <line x1="80" y1="8" x2="84" y2="27"/>
      <line x1="120" y1="8" x2="116" y2="27"/>
      <line x1="45" y1="18" x2="55" y2="32"/>
      <line x1="155" y1="18" x2="145" y2="32"/>
    </g>
    <path d="M40 65 A60 60 0 0 1 160 65" fill="none" stroke="var(--red)" stroke-width="4"/>
    <path d="M20 90 Q50 78 80 90 T140 90 T180 90" fill="none" stroke="var(--red)" stroke-width="3"/>
    <path d="M15 105 Q50 93 85 105 T155 105 T185 105" fill="none" stroke="var(--red)" stroke-width="3"/>
  </svg>
  <div class="menu-word">Sunset</div>
  <div class="brand" style="font-size:2.6rem;margin-top:-8px;">Menü</div>
</div>

<div class="accordion" id="content">
  <div class="empty-msg">Yükleniyor...</div>
</div>

<footer>Fiyatlara KDV dahildir · Sunset Cafe</footer>

<script>
// BURAYA ADMIN'DEKİ AYNI BİLGİLERİ GİR KANKA
const BIN_ID = "6a5791efda38895dfe613665"; 
const API_KEY = "$2a$10$koCErSpzoZ4Dn9HUre3RJ.oRrkiOClpNgct1ZtTCEemsldHQoXN82";

function formatPrice(p){
  const n = Number(p) || 0;
  return n.toFixed(2).replace(".00","") + " ₺";
}

function loadMenu(){
  fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { 'X-Master-Key': API_KEY }
  })
  .then(res => res.json())
  .then(json => {
    const fetchedData = json.record || [];
    if(fetchedData.length > 0) {
      render(fetchedData);
    } else {
      document.getElementById("content").innerHTML = '<div class="empty-msg">Menü henüz hazırlanıyor veya boş.</div>';
    }
  })
  .catch(err => {
    document.getElementById("content").innerHTML = '<div class="empty-msg">Bağlantı hatası. Menü yüklenemedi.</div>';
  });
}

function render(data){
  const contentEl = document.getElementById("content");
  contentEl.innerHTML = "";

  data.forEach((cat, idx) => {
    const section = document.createElement("div");
    section.className = "category" + (idx===0 ? " open" : "");
    section.id = "sec-"+cat.id;

    let itemsHtml = "";
    if (cat.items) {
      itemsHtml = cat.items.map(it => `
        <div class="item">
          <span class="name">${it.name}${it.note ? `<span class="note">${it.note}</span>` : ""}</span>
          <span class="price">${formatPrice(it.price)}</span>
        </div>`).join("");
    }

    section.innerHTML = `
      <div class="cat-header">
        <h2>${cat.name}</h2>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="cat-body">
        <div class="cat-body-inner">
          <div class="cat-items">${itemsHtml}</div>
        </div>
      </div>`;

    section.querySelector(".cat-header").addEventListener("click", () => {
      section.classList.toggle("open");
    });

    contentEl.appendChild(section);
  });
}

loadMenu();
setInterval(loadMenu, 30000); 
</script>
</body>
</html>
